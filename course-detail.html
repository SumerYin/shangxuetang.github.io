        images: ['https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/file_800941ad.png?sign=1785671128-e8d74bdd72-0-57ea856f4d90398c2c0465267a95cd720307b0effd09e11c928bdc072a72cfce','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/1_bb2ae7d2.png?sign=1785671128-026e467d3f-0-f956de5d363941ae74477edffddf19cfaa606986065567fa9551d19bb5de8e5c','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/2_dd9ec7d9.png?sign=1785671128-f7c369177a-0-4a5d79bb4ed9d5f6c0e0c79f80c6e077fe6226016985f68c171049fb296a9d10','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/3_a4fb65f4.png?sign=1785671129-f361881ad3-0-7e94f7dac4526404b9aa606b02291af38dc59fb311ff13e1b98f93b25c90c0da','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/4_a836a9c4.png?sign=1785671129-e62110832a-0-2542537eadb010f3524c3c2387894de14a5c999fa6bc30a0b7e7f860990e795a','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/5_ce8b61bc.png?sign=1785671129-70ed16e1e4-0-00c07523c9df25b006068632ab24aff187149b893cd59287ddc3ed7cc22eaa36','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/6_ecee33e5.png?sign=1785671129-38b4bf67b6-0-404cf104077c3dc4e92df6e11cc2e9d45ad1def7964b3f479ccf8ec9086047a4','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/7_08f59f7c.png?sign=1785671129-47c5761c6b-0-3a8ec86f2ccf6306d1386579d353933bf0b2e70518f3b9ecd76c9c7d89d1d6a8','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/8_aed65092.png?sign=1785671130-c757899876-0-6aa6eb34007e942d96b8f2a077719ba76901b477b2f0656522cb6aef93a97060','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/9_6cfdbe7e.png?sign=1785671130-8f2a9db198-0-f17ffaffc355fd6413e85d786e587e84ce8b1360a8d095c8d0a7a756ad0af35d','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/10_3fbfab51.png?sign=1785671130-91a347aebe-0-ed63fb718c925bd8c469d003bbf31eb63a0414cf864c361de28432cd780b137c','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/11_10e61a5d.png?sign=1785671130-9bd8a2274f-0-8d3d75bf1456b3d03d64b4fd8469ef58f33c6b3dfb06e14aeb5158b2cf64b3f8','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/12_9b25484d.png?sign=1785671131-725ead6d22-0-e9b91300bd46633815dd3286b07f7aa908c2fa0cf49d3eb61dcc0bf53ec1a8e0','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/13_6a21c29a.png?sign=1785671131-254f4b5bb0-0-25957316ed3f712fbff542ed6d9c49600f268bf8438c11146e8b947d1f4cca25']
      }
    };

    // 解析URL参数
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('id') || 'bangshu';
    const course = courses[courseId];

    if (course) {
      document.title = course.title + ' - 尚学堂美育书画工作室';
      let imagesHtml = '';
      if (course.images.length > 0) {
        imagesHtml = '<div class="columns-2 gap-3 mt-8">';
        course.images.forEach(img => {
          const filename = img.split('/').pop().split('?')[0];
          const src = img.startsWith('http') ? img : (function() { const parts = img.split('/'); parts.pop(); return parts.join('/') + '/' + encodeURIComponent(filename); })();
          imagesHtml += '<div class="bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer break-inside-avoid mb-3" onclick="openModal(\'' + src + '\')">';
          imagesHtml += '<img src="' + src + '" alt="' + filename + '" class="w-full h-auto block">';
          imagesHtml += '</div>';
        });
        imagesHtml += '</div>';
      }

      document.getElementById('courseContent').innerHTML = `
        <section class="py-16 px-6 text-center">
          <span class="seal w-14 h-14 text-2xl font-bold mb-3 mx-auto" style="background:${course.sealBg}">${course.seal}</span>
          <h1 class="font-calligraphy text-3xl text-[#2a2a2a] mt-3 tracking-wider">${course.title}</h1>
          <div class="ink-divider max-w-xs mx-auto mt-4 mb-3"></div>
          <p class="text-[#8a8580]">${course.desc}</p>
        </section>
        <section class="px-6 pb-16">
          <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-xl shadow-md p-8 mb-8">
              <h2 class="font-calligraphy text-xl text-[#2a2a2a] mb-4 flex items-center gap-2">
                <span class="seal w-8 h-8 text-sm font-bold" style="background:${course.sealBg}">介</span>
                课程介绍
              </h2>
              <p class="text-[#2a2a2a] leading-relaxed text-sm">${course.intro}</p>
            </div>
            ${imagesHtml ? `
            <div>
              <h2 class="font-calligraphy text-xl text-[#2a2a2a] mb-4 flex items-center gap-2">
                <span class="seal w-8 h-8 text-sm font-bold" style="background:${course.sealBg}">影</span>
                课程掠影
              </h2>
              ${imagesHtml}
            </div>` : ''}
            <div class="mt-8 text-center">
              <a href="./courses.html?tese" class="inline-block px-8 py-3 rounded-full text-sm font-semibold text-[#faf8f3] transition" style="background:${course.sealBg}">
                ← 返回课程体系
              </a>
            </div>
          </div>
        </section>
      `;
    } else {
      document.getElementById('courseContent').innerHTML = `
        <section class="py-24 px-6 text-center">
          <h1 class="font-calligraphy text-3xl text-[#2a2a2a]">课程未找到</h1>
          <a href="./courses.html?tese" class="inline-block mt-6 px-8 py-3 rounded-full bg-[#b8312f] text-sm font-semibold text-[#faf8f3]">← 返回课程体系</a>
        </section>
      `;
    }
  </script>

  <script>
    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      if (menu) {
        menu.classList.toggle('hidden');
      }
    }
  </script>
