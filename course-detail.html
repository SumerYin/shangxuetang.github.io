      }
    };

    // 解析URL参数
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('id') || 'bangshu';
    const course = courses[courseId];

    if (course) {
      document.title = course.title + ' - 尚学堂美育书画工作室';
      let imagesHtml = '';
      if (course.images.length > 0) {
        imagesHtml = '<div class="grid grid-cols-2 gap-3 mt-8">';
        course.images.forEach(img => {
          const filename = img.split('/').pop();
          const encoded = encodeURIComponent(filename);
          const parts = img.split('/');
          parts.pop();
          const encodedSrc = parts.join('/') + '/' + encoded;
          imagesHtml += '<div class="bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer" onclick="openModal(\'' + encodedSrc + '\')">';
          imagesHtml += '<img src="' + encodedSrc + '" alt="' + filename + '" class="w-full h-auto block">';
          imagesHtml += '</div>';
        });
        imagesHtml += '</div>';
      }

      document.getElementById('courseContent').innerHTML = `
        <section class="py-16 px-6 text-center">
          <span class="seal w-14 h-14 text-2xl font-bold mb-3 mx-auto" style="background:${course.sealBg}">${course.seal}</span>
          <h1 class="font-calligraphy text-3xl text-[#2a2a2a] mt-3 tracking-wider">${course.title}</h1>
          <div class="ink-divider max-w-xs mx-auto mt-4 mb-3"></div>
          <p class="text-[#8a8580]">${course.desc}</p>
        </section>
        <section class="px-6 pb-16">
          <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-xl shadow-md p-8 mb-8">
              <h2 class="font-calligraphy text-xl text-[#2a2a2a] mb-4 flex items-center gap-2">
                <span class="seal w-8 h-8 text-sm font-bold" style="background:${course.sealBg}">介</span>
                课程介绍
              </h2>
              <p class="text-[#2a2a2a] leading-relaxed text-sm">${course.intro}</p>
            </div>
            ${imagesHtml ? `
            <div>
              <h2 class="font-calligraphy text-xl text-[#2a2a2a] mb-4 flex items-center gap-2">
                <span class="seal w-8 h-8 text-sm font-bold" style="background:${course.sealBg}">影</span>
                课程掠影
              </h2>
              ${imagesHtml}
            </div>` : ''}
            <div class="mt-8 text-center">
              <a href="./courses.html?tese" class="inline-block px-8 py-3 rounded-full text-sm font-semibold text-[#faf8f3] transition" style="background:${course.sealBg}">
                ← 返回课程体系
              </a>
            </div>
          </div>
        </section>
      `;
    } else {
      document.getElementById('courseContent').innerHTML = `
        <section class="py-24 px-6 text-center">
          <h1 class="font-calligraphy text-3xl text-[#2a2a2a]">课程未找到</h1>
          <a href="./courses.html?tese" class="inline-block mt-6 px-8 py-3 rounded-full bg-[#b8312f] text-sm font-semibold text-[#faf8f3]">← 返回课程体系</a>
        </section>
      `;
    }
  </script>
