        images: ['https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/file_44a5d084.png?sign=1785672531-2856be3816-0-4377b634bfa5996bd4f6cc5b38522c0d188c19e1b131fdedf914b898507fc3b6','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/1_54ebaae3.png?sign=1785672532-b7db14add6-0-dd6b8daced6338e0fb1665b22790627253ca4e30d4833fc1dfc4c61c2409b4f5','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/2_978da5e1.png?sign=1785672532-a255575450-0-3b2a4de59296b8cfd7826a8195ff24af70faf5847f07b9f16044654e529fd018','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/3_5c979ac9.png?sign=1785672532-c26f2ced3e-0-0e2681f3098cc16570f1dc99520a073731fc13345b1b8f2efb5f0a9b4734992d','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/4_da055e89.png?sign=1785672533-aa1d19af01-0-06c6113f2ad3840644e248103dcb0798547c6d05a0db922a36fee423bf81d3cf','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/5_ec4ca8aa.png?sign=1785672533-0679f205cf-0-84925b1dae802b17a14dcc0f1ae6e9b694d7b041d5df5d1e81efdea9a0b97874','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/6_058c32c8.png?sign=1785672534-3581ebf1d1-0-82320df36eadedc6e357126ba56d7aecad3cec6e6d8ad6438f6a531a8835e571','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/7_cd3a8fdf.png?sign=1785672534-767129abcf-0-ef490e4e7d883f266b1b29787f2de2208b8a5cb7ef8c086011c6281ab833ad82','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/8_6e5f08a4.png?sign=1785672534-f34b9980d4-0-dfb0ed0f50ccda7d765089207153374c152203850369b9ee5b3af76f7488d200','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/9_3f005060.png?sign=1785672535-9f1fbc412b-0-40eb7669ba0c0b93204006ce63b1d5dab1f538d7d9c1a60763c1bc2c934b5928','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/10_fb5856f8.png?sign=1785672535-be5243b28d-0-d6613f8b558af70a7077ba2eac2b581c27e8d929018247dd992921fb64c2062f','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/11_7dce542c.png?sign=1785672535-60c7a40f83-0-19e00c5827f8919bbd3d91fd3f99747e32bb4fe240d402a1a378cf8c5d6bc696','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/12_9837e82d.png?sign=1785672536-dedc150da8-0-86d8b8afbc8a0b10ec40b95b5982b848172b75ff925fe8c2d761ef2b87abebfa','https://coze-coding-project.tos.coze.site/coze_storage_7655286718647566336/shangxuetang/13_ebd8240e.png?sign=1785672536-c759401b7c-0-d734f493c0a17c89bec8ad98902e62e0f2dcb149eedca043de6d743d70ca4e8c']
      }
    };

    // 解析URL参数
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('id') || 'bangshu';
    const course = courses[courseId];

    if (course) {
      document.title = course.title + ' - 尚学堂美育书画工作室';
      let imagesHtml = '';
      if (course.images.length > 0) {
        imagesHtml = '<div class="columns-2 gap-3 mt-8">';
        course.images.forEach(img => {
          const filename = img.split('/').pop().split('?')[0];
          const src = img.startsWith('http') ? img : (function() { const parts = img.split('/'); parts.pop(); return parts.join('/') + '/' + encodeURIComponent(filename); })();
          imagesHtml += '<div class="bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer break-inside-avoid mb-3" onclick="openModal(\'' + src + '\')">';
          imagesHtml += '<img src="' + src + '" alt="' + filename + '" class="w-full h-auto block">';
          imagesHtml += '</div>';
        });
        imagesHtml += '</div>';
      }

      document.getElementById('courseContent').innerHTML = `
        <section class="py-16 px-6 text-center">
          <span class="seal w-14 h-14 text-2xl font-bold mb-3 mx-auto" style="background:${course.sealBg}">${course.seal}</span>
          <h1 class="font-calligraphy text-3xl text-[#2a2a2a] mt-3 tracking-wider">${course.title}</h1>
          <div class="ink-divider max-w-xs mx-auto mt-4 mb-3"></div>
          <p class="text-[#8a8580]">${course.desc}</p>
        </section>
        <section class="px-6 pb-16">
          <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-xl shadow-md p-8 mb-8">
              <h2 class="font-calligraphy text-xl text-[#2a2a2a] mb-4 flex items-center gap-2">
                <span class="seal w-8 h-8 text-sm font-bold" style="background:${course.sealBg}">介</span>
                课程介绍
              </h2>
              <p class="text-[#2a2a2a] leading-relaxed text-sm">${course.intro}</p>
            </div>
            ${imagesHtml ? `
            <div>
              <h2 class="font-calligraphy text-xl text-[#2a2a2a] mb-4 flex items-center gap-2">
                <span class="seal w-8 h-8 text-sm font-bold" style="background:${course.sealBg}">影</span>
                课程掠影
              </h2>
              ${imagesHtml}
            </div>` : ''}
            <div class="mt-8 text-center">
              <a href="./courses.html?tese" class="inline-block px-8 py-3 rounded-full text-sm font-semibold text-[#faf8f3] transition" style="background:${course.sealBg}">
                ← 返回课程体系
              </a>
            </div>
          </div>
        </section>
      `;
    } else {
      document.getElementById('courseContent').innerHTML = `
        <section class="py-24 px-6 text-center">
          <h1 class="font-calligraphy text-3xl text-[#2a2a2a]">课程未找到</h1>
          <a href="./courses.html?tese" class="inline-block mt-6 px-8 py-3 rounded-full bg-[#b8312f] text-sm font-semibold text-[#faf8f3]">← 返回课程体系</a>
        </section>
      `;
    }
  </script>
  <script>
    function toggleMobileMenu() {
      var menu = document.getElementById('mobile-menu');
      if (menu) {
        menu.classList.toggle('hidden');
      }
    }
  </script>
