<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教室环境 - 尚学堂美育书画工作室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif SC', serif; background: #faf8f3; }
    .font-calligraphy { font-family: 'Ma Shan Zheng', cursive; }
    .seal { display: inline-flex; align-items: center; justify-content: center; background: #b8312f; color: #faf8f3; border-radius: 3px; }
    .ink-divider { height: 1px; background: linear-gradient(90deg, transparent, #2a2a2a33, transparent); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; cursor: pointer; }
    .modal-overlay.active { display: flex; }
    .modal-overlay img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
    .env-card img { cursor: pointer; transition: transform 0.2s; }
    .env-card img:hover { transform: scale(1.02); }
  </style>
</head>
<body class="min-h-screen">
  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-[#2a2a2a] shadow-lg">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="/api/shangxuetang/home" class="flex items-center gap-3">
        <span class="seal w-8 h-8 text-sm font-bold">尚</span>
        <span class="text-[#faf8f3] font-calligraphy text-lg tracking-wider">尚学堂美育</span>
      </a>
      <div class="flex items-center gap-6">
        <a href="/api/shangxuetang/home" class="text-[#d4c5b0] hover:text-[#faf8f3] text-sm tracking-wider transition">首页</a>
        <a href="/api/shangxuetang/teachers" class="text-[#d4c5b0] hover:text-[#faf8f3] text-sm tracking-wider transition">师资</a>
        <a href="/api/shangxuetang/courses" class="text-[#d4c5b0] hover:text-[#faf8f3] text-sm tracking-wider transition">课程</a>
        <a href="/api/shangxuetang/works" class="text-[#d4c5b0] hover:text-[#faf8f3] text-sm tracking-wider transition">作品</a>
        <a href="/api/shangxuetang/classroom" class="text-[#faf8f3] text-sm tracking-wider font-semibold">教室</a>
        <a href="/api/shangxuetang/contact" class="text-[#d4c5b0] hover:text-[#faf8f3] text-sm tracking-wider transition">联系</a>
        <a href="/api/shangxuetang/daily-word" class="text-[#d4c5b0] hover:text-[#faf8f3] text-sm tracking-wider transition">每日一字</a>
        <a href="/api/shangxuetang/feedback" class="text-[#d4c5b0] hover:text-[#faf8f3] text-sm tracking-wider transition">学员反馈</a>
      </div>
    </div>
  </nav>

  <main class="pt-16">
    <!-- Page Header -->
    <section class="py-16 px-6 text-center">
      <span class="seal w-14 h-14 text-2xl font-bold mb-3 mx-auto">境</span>
      <h1 class="font-calligraphy text-4xl text-[#2a2a2a] mt-3 tracking-wider">教学环境</h1>
      <div class="ink-divider max-w-xs mx-auto mt-4 mb-3"></div>
      <p class="text-[#8a8580]">雅室翰墨 · 修身养性</p>
    </section>

    <!-- 教室图片 -->
    <section class="px-6 pb-10">
      <div class="max-w-5xl mx-auto">
        <h2 class="font-calligraphy text-2xl text-[#2a2a2a] mb-6 text-center tracking-wider">教学环境</h2>
        <div class="grid md:grid-cols-3 gap-4">
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%83.jpg" alt="教学环境" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%831.jpg" alt="教学环境1" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%832.jpg" alt="教学环境2" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%833.jpg" alt="教学环境3" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%834.jpg" alt="教学环境4" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%835.jpg" alt="教学环境5" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%836.jpg" alt="教学环境6" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%837.jpg" alt="教学环境7" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%838.jpg" alt="教学环境8" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%839.jpg" alt="教学环境9" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
          <div class="env-card bg-white rounded-xl shadow-md overflow-hidden">
            <img src="/api/shangxuetang/img/%E6%95%99%E5%AD%A6%E7%8E%AF%E5%A2%8310.jpg" alt="教学环境10" class="w-full aspect-[4/3] object-cover" onclick="openModal(this.src)">
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="py-8 px-6 bg-[#2a2a2a]">
      <div class="max-w-4xl mx-auto text-center">
        <span class="seal w-10 h-10 text-base font-bold mb-3 mx-auto">尚</span>
        <p class="text-[#d4c5b0] mt-3 font-calligraphy text-lg tracking-wider">尚学堂美育书画工作室</p>
      </div>
    </footer>
  </main>

  <!-- Image Modal -->
  <div id="imageModal" class="modal-overlay" onclick="closeModal()">
    <img id="modalImage" src="" alt="">
  </div>

  <script>
    function openModal(src) {
      document.getElementById('modalImage').src = src;
      document.getElementById('imageModal').classList.add('active');
    }
    function closeModal() {
      document.getElementById('imageModal').classList.remove('active');
    }
  </script>
</body>
</html>
