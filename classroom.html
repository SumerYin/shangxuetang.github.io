  <style>
    body { font-family: 'Noto Serif SC', serif; background: #faf8f3; }
    .font-calligraphy { font-family: 'Ma Shan Zheng', cursive; }
    .seal { display: inline-flex; align-items: center; justify-content: center; background: #b8312f; color: #faf8f3; border-radius: 3px; }
    .ink-divider { height: 1px; background: linear-gradient(90deg, transparent, #2a2a2a33, transparent); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; cursor: pointer; }
    .modal-overlay.active { display: flex; }
    .modal-overlay img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
    .env-card img, .env-card Image {
      image-rendering: -webkit-optimize-contrast;
    }
    .env-card { cursor: pointer; transition: transform 0.2s; }
    .env-card img:hover { transform: scale(1.02); }
  
    /* Mobile menu */
    .mobile-menu { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: #2a2a2a; padding: 0.75rem 1.5rem; border-top: 1px solid #444; z-index: 51; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { padding: 0.6rem 0; border-bottom: 1px solid #333; }
    .hamburger { display: none; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: #d4c5b0; margin: 5px 0; border-radius: 1px; }
    @media (max-width: 768px) {
      .desktop-nav { display: none !important; }
      .hamburger { display: block; }
      nav a { writing-mode: horizontal-tb !important; letter-spacing: 0.05em !important; }
      .mobile-menu a { writing-mode: horizontal-tb !important; }
    }
</style>

  <script>
    function openModal(src) {
      document.getElementById('modalImage').src = src;
      document.getElementById('imageModal').classList.add('active');
    }
    function closeModal() {
      document.getElementById('imageModal').classList.remove('active');
    }
  </script>
  <script>
    function toggleMobileMenu() {
      var menu = document.getElementById('mobile-menu');
